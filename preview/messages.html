<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#0a0a0a;font-family:'Inter',sans-serif;color:#f0f0f0;display:flex;flex-direction:column;gap:8px;max-width:460px;}
.row{display:flex;align-items:flex-end;gap:8px;}
.row.me{justify-content:flex-end;}
.av{width:24px;height:24px;border-radius:50%;background:#2a2a2a;color:#e0e0e0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;}
.them{background:#1a1a1a;color:#f0f0f0;border-bottom-left-radius:4px;}
.mine{background:#818CF8;color:#0a0a0a;font-weight:600;border-bottom-right-radius:4px;}
.ts{font-size:10px;color:#555;text-align:center;margin:8px 0 4px;}
</style></head><body>
<div class="ts">Today · 09:24</div>
<div class="row"><div class="av">CM</div><div class="b them">Hey — hit your protein target yesterday?</div></div>
<div class="row me"><div class="b mine">Yeah, 148/150g. One short.</div></div>
<div class="row me"><div class="b mine">Feeling good for legs tonight 💪</div></div>
<div class="row"><div class="av">CM</div><div class="b them">Good. Keep RPE 8 on squats, then accessories light.</div></div>
</body></html>
